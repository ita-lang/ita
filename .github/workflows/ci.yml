# ===========================================================================
# CI do compilador Itá — valida o backend pinado no Dart stable 3.12.2
# ===========================================================================
# O Itá compila .tu -> Dart Kernel (.dill) e roda na Dart VM. O numero do
# FORMATO BINARIO de Kernel e um contrato interno SEM SemVer (ver dart-sdk.pin):
# a VM so carrega um .dill cujo formato bate EXATAMENTE com o `dart` +
# vm_platform.dill + pkg/kernel usados. Este CI existe para pegar version-skew
# desse formato e regressoes na suite antes de chegarem ao main.
#
# Runner: macOS arm64 (macos-14 = Apple Silicon). O dart-sdk.pin fixa o zip
# `dartsdk-macos-arm64-release.zip` com sha256 especifico de plataforma, entao
# o CI roda no MESMO OS/arch do pin — reproduz o ambiente byte-a-byte. Trocar
# para Linux exigiria estender o pin com URL/sha por plataforma.
# ===========================================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  # Nightly (07:00 UTC): roda a suite COMPLETA — inclui o oracle JS mesmo sem
  # mudança de codegen. Pega drift EXTERNO que um PR de codegen-limpo não cobre:
  # bump do Node preinstalado no runner, regressão latente do dart2js do SDK
  # pinado, flutuação de ambiente. É a rede de segurança do "pular nos PRs".
  schedule:
    - cron: '0 7 * * *'

# Cancela runs obsoletos do mesmo ref quando chega um push novo.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build + suite (Dart stable pinado)
    runs-on: macos-14 # Apple Silicon (arm64): casa com o SDK do dart-sdk.pin
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # História completa: o passo "Escopo do oracle JS" compara a base do PR
          # com o merge commit (HEAD) via `git diff` pra decidir se roda o oracle.
          # O checkout shallow (default fetch-depth:1) não teria o commit base, e
          # o diff falharia. Usar HEAD (não head.sha) cobre PRs de fork também.
          fetch-depth: 0

      - name: Ler dart-sdk.pin
        id: pin
        run: |
          set -euo pipefail
          echo "ver=$(grep -E '^DART_VERSION=' dart-sdk.pin | cut -d= -f2-)" >> "$GITHUB_OUTPUT"
          echo "sha=$(grep -E '^SDK_ZIP_SHA256=' dart-sdk.pin | cut -d= -f2-)" >> "$GITHUB_OUTPUT"

      # O SDK stable (~200 MB) e gitignored e reproduzivel via pin-dart.sh.
      # Cacheado pela sha256 do zip -> invalida sozinho num bump de versao.
      - name: Cache do Dart SDK stable (.dart-sdk/)
        uses: actions/cache@v6
        with:
          path: .dart-sdk
          key: dart-sdk-${{ runner.os }}-${{ runner.arch }}-${{ steps.pin.outputs.sha }}

      # Materializa e VALIDA o pin: baixa+verifica o SDK (sha256), regenera o
      # toml.runtime.dill e faz ASSERT do formato de Kernel == 130, compila
      # hello.tu e confere o formato emitido. Falha o CI em qualquer skew.
      # O vendor pkg/kernel ja vem versionado no checkout, entao o passo de
      # sparse-checkout do pin e pulado (sem dependencia de rede pra isso).
      - name: Materializar + validar o pin (pin-dart.sh)
        run: bash tools/pin-dart.sh

      # Compila o `itac` AOT (binario nativo) UMA vez e exporta ITA_ITAC_BIN +
      # ITA_COMPILER_LIB pros passos seguintes (via $GITHUB_ENV). Todo runner que
      # compila .tu passa a usar o binario no lugar do JIT (`dart itac.dart`):
      # ~250x por invocacao -> a suite inteira cai de minutos p/ segundos
      # (ex.: conformancia 76 arquivos: ~76 s -> ~1,5 s). O binario (~10 MB,
      # platform-specific) e gitignored (build/) -> rebuildado a cada run.
      # ITA_COMPILER_LIB e necessario porque sob AOT o Platform.script aponta pro
      # binario: sem ele, o codegen nao acha compiler/lib/toml e emitiria um
      # .dill diferente do JIT p/ programas que usam Toml.
      - name: Build do itac AOT
        run: |
          set -euo pipefail
          VER="${{ steps.pin.outputs.ver }}"
          export ITA_DART_BIN="$PWD/.dart-sdk/$VER/dart-sdk/bin/dart"
          bash tools/build-itac.sh "$PWD/build/itac"
          echo "ITA_ITAC_BIN=$PWD/build/itac" >> "$GITHUB_ENV"
          echo "ITA_COMPILER_LIB=$PWD/compiler/lib" >> "$GITHUB_ENV"

      # Guarda de compile-time: compila um conjunto fixo de exemplos N vezes com
      # o AOT e FALHA se a mediana passar do limite (0,5 s/arquivo). Pega uma
      # regressao grave -- volta pro JIT (~1-9 s) ou blow-up O(n^2) no pipeline --
      # antes do merge. Racional do limite documentado no proprio script.
      - name: Benchmark de compile-time (guard)
        run: bash compiler/test/bench/compile_bench.sh

      # Suite de examples: 48 programas .tu (exclui os 2 modulos sem main;
      # os 5 servers/listeners sao compile-only). Sai !=0 em qualquer regressao.
      # Compila cada example via o itac AOT (ITA_ITAC_BIN, do passo acima).
      - name: Suite de examples
        run: bash .claude/skills/ita-test/test.sh examples

      # Testes unitarios: itac test sobre test/**/*_test.tu.
      - name: Testes unitarios
        run: bash .claude/skills/ita-test/test.sh unit

      # Conformancia sintatica: corpus de programas .tu minimos (um por
      # construcao da GRAMMAR.md) rodados via `itac check`. Blinda a gramatica
      # contra regressoes: todo valid/ deve passar e todo invalid/ deve
      # reprovar. Sai !=0 em qualquer discrepancia (regressao do parser OU
      # buraco novo: o parser passou a aceitar algo que deveria rejeitar).
      - name: Conformância sintática (corpus GRAMMAR.md)
        run: |
          set -euo pipefail
          VER="${{ steps.pin.outputs.ver }}"
          export ITA_DART_BIN="$PWD/.dart-sdk/$VER/dart-sdk/bin/dart"
          export ITA_PLATFORM_DILL="$PWD/.dart-sdk/$VER/dart-sdk/lib/_internal/vm_platform.dill"
          export ITA_PACKAGES="$PWD/compiler/.dart_tool/package_config.json"
          bash compiler/test/conformance/run_conformance.sh

      # Escopo do oracle JS: o dart2js dos ~33 exemplos e' DE LONGE o passo mais
      # caro do CI (~11 min de ~13). Seu resultado so muda quando muda o CODEGEN,
      # o parser/semantic/lexer, o proprio runner de paridade, ou os exemplos.
      # Entao so rodamos o oracle quando faz sentido:
      #   - schedule (nightly)  -> sempre (pega drift externo: Node/dart2js);
      #   - workflow_dispatch   -> sempre (disparo manual = quero validar tudo);
      #   - push no main        -> sempre (gate do que entra na branch protegida);
      #   - pull_request        -> so se o diff base..HEAD tocar paths de paridade.
      # PR que nao toca esses paths -> oracle PULADO -> CI de PR cai p/ ~2 min.
      # Comparamos base.sha (parent do merge commit, presente com fetch-depth:0)
      # contra HEAD (o merge ref ja com as mudancas do PR) -> funciona p/ PR de
      # fork tambem (nao depende do head.sha do fork estar fetchado).
      - name: Escopo do oracle JS (decide se roda)
        id: oracle_scope
        run: |
          set -euo pipefail
          # Paths cujo conteudo pode alterar a saida VM/JS de qualquer exemplo.
          PATTERNS='^(compiler/lib/codegen/|compiler/lib/parser/|compiler/lib/semantic/|compiler/lib/lexer/|compiler/test/js_parity/|examples/)'
          run_it=false; reason=""
          case "${{ github.event_name }}" in
            schedule)          run_it=true;  reason="nightly (schedule)" ;;
            workflow_dispatch) run_it=true;  reason="disparo manual (workflow_dispatch)" ;;
            push)
              if [ "${{ github.ref }}" = "refs/heads/main" ]; then
                run_it=true;  reason="push no main (branch protegida)"
              else
                run_it=true;  reason="push fora do main -> roda por seguranca"
              fi ;;
            pull_request)
              base="${{ github.event.pull_request.base.sha }}"
              if git diff --name-only "$base" HEAD | grep -Eq "$PATTERNS"; then
                run_it=true;  reason="PR toca codegen/parser/semantic/lexer/js_parity/examples"
              else
                run_it=false; reason="PR nao toca paths de paridade"
              fi ;;
            *) run_it=true;  reason="evento '${{ github.event_name }}' nao mapeado -> roda por seguranca" ;;
          esac
          echo "run=$run_it" >> "$GITHUB_OUTPUT"
          if [ "$run_it" = "true" ]; then
            echo "::notice title=oracle JS::sera executado — $reason"
          else
            echo "::notice title=oracle JS::oracle pulado: nenhuma mudança de codegen ($reason)"
          fi

      # Paridade VM x Node (oracle JS): o MESMO .dill roda na Dart VM e compila
      # para JS (dart2js -> Node). A saida da VM e' o ORACLE; cada example e'
      # classificado (MATCH > NUM > MISMATCH > NODE_ERR > DART2JS_CRASH) e
      # reconciliado com o snapshot versionado expected.txt. Sai !=0 se QUALQUER
      # example PIORAR de status (regressao de codegen do alvo JS); so avisa se
      # melhorar. Node ja vem preinstalado no runner macos-14. Usa o itac AOT
      # (ITA_ITAC_BIN, exportado no passo "Build do itac AOT" via GITHUB_ENV) pro
      # lado .tu->.dill; o dart2js/VM usam o `dart` real. So roda quando o passo
      # "Escopo do oracle JS" acima decidiu que vale a pena (if abaixo).
      - name: Paridade VM×Node (oracle JS)
        if: steps.oracle_scope.outputs.run == 'true'
        run: |
          set -euo pipefail
          VER="${{ steps.pin.outputs.ver }}"
          export ITA_DART_BIN="$PWD/.dart-sdk/$VER/dart-sdk/bin/dart"
          export ITA_PLATFORM_DILL="$PWD/.dart-sdk/$VER/dart-sdk/lib/_internal/vm_platform.dill"
          export ITA_PACKAGES="$PWD/compiler/.dart_tool/package_config.json"
          bash compiler/test/js_parity/run_js_parity.sh

      # Regressao da stdlib (repo irmao ita-lang/stdlib): garante que os 12
      # modulos continuem (1) COMPILANDO (`itac check`) e (2) RODANDO
      # (run + golden via stdlib/test/run_runtime.sh) com o compilador deste
      # PR. Clona a stdlib (HEAD). Qualquer erro/mismatch -> exit !=0.
      - name: Regressão da stdlib (compila + roda)
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/ita-lang/stdlib.git "$RUNNER_TEMP/stdlib"
          VER="${{ steps.pin.outputs.ver }}"
          export ITA_DART_BIN="$PWD/.dart-sdk/$VER/dart-sdk/bin/dart"
          export ITA_PLATFORM_DILL="$PWD/.dart-sdk/$VER/dart-sdk/lib/_internal/vm_platform.dill"
          export ITA_PACKAGES="$PWD/compiler/.dart_tool/package_config.json"
          export ITA_ITAC="$PWD/compiler/bin/itac.dart"
          export ITA_STDLIB="$RUNNER_TEMP/stdlib"
          # itac check via AOT (ITA_ITAC_BIN, do passo "Build do itac AOT");
          # fallback JIT se ausente. Mesmo resultado, so + rapido.
          if [ -n "${ITA_ITAC_BIN:-}" ] && [ -x "$ITA_ITAC_BIN" ]; then
            CHECK=( "$ITA_ITAC_BIN" )
          else
            CHECK=( "$ITA_DART_BIN" --packages="$ITA_PACKAGES" "$ITA_ITAC" )
          fi
          echo "== 1. compila: itac check nos 12 modulos =="
          for m in async cache collections config datetime event iter log math server text validate; do
            echo "-- check $m.tu"
            "${CHECK[@]}" check "$RUNNER_TEMP/stdlib/$m.tu"
          done
          # run_runtime.sh vive no repo stdlib (irmao); ele proprio decide como
          # invoca o compilador. Se respeitar ITA_ITAC_BIN, herda o AOT; senao
          # cai no JIT. Fora do escopo deste repo ajusta-lo -- ver Reporte.
          echo "== 2. roda: run + golden (run_runtime.sh) =="
          bash "$RUNNER_TEMP/stdlib/test/run_runtime.sh"
